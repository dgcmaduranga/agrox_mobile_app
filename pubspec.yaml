name: agrox_mobile_app
description: "AgroX Mobile Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.0.5

  flutter_screenutil: ^5.9.0

  # 🔥 Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0

  # 🔥 Google Sign-In
  google_sign_in: ^6.2.1

  # 🔥 FIXED VERSION (IMPORTANT)
  carousel_slider: 4.0.0

  # 🔥 Dots indicator
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # 🔹 Main images
    - assets/images/logo.png
    - assets/images/welcome.png
    - assets/images/paddy.png
    - assets/images/tea.png
    - assets/images/coconut.png

    # 🔹 Disease images (folders)
    - assets/images/diseases/tea/
    - assets/images/diseases/rice/
    - assets/images/diseases/coconut/

    # 🔹 JSON data
    - assets/data/diseases.json