name: agrox_mobile_app
description: "AgroX Mobile Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7
  http: ^1.2.0
  geolocator: ^12.0.0
  cupertino_icons: ^1.0.8

  provider: ^6.0.5

  shared_preferences: ^2.3.3
  flutter_screenutil: ^5.9.0
  intl: ^0.18.0

  # 🔥 Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.4

  # 🔥 Google Sign-In
  google_sign_in: ^6.2.1

  # 🔥 FIXED VERSION
  carousel_slider: 4.0.0

  # 🔥 Dots indicator
  smooth_page_indicator: ^1.1.0
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 🔥 App launcher icon generator
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    # 🔹 Main images
    - assets/images/logo.png
    - assets/images/icon.png
    - assets/images/welcome.png
    - assets/images/paddy.png
    - assets/images/tea.png
    - assets/images/coconut.png
    - assets/images/welcome2.png

    # 🔹 Disease images folders
    - assets/images/diseases/tea/
    - assets/images/diseases/rice/
    - assets/images/diseases/coconut/
    - diseases.json